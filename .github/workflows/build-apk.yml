name: Build OpenWrt APK Packages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    name: Compile APKs for OpenWrt 25.12.4
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Cache layer 1: Downloaded source tarballs (very stable, survives build script changes)
      - name: Cache Downloads
        uses: actions/cache@v5
        with:
          path: dl
          key: ${{ runner.os }}-openwrt-dl-25.12.4
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      # Cache layer 2: Host toolchain (SDK Python, host tools — expensive to rebuild, rarely changes)
      - name: Cache Host Toolchain
        uses: actions/cache@v5
        with:
          path: |
            openwrt-sdk/staging_dir/hostpkg
            openwrt-sdk/staging_dir/host
          key: ${{ runner.os }}-openwrt-host-25.12.4-${{ hashFiles('1_compile.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-host-25.12.4-

      # Cache layer 3: Full SDK (staging_dir/target, build_dir, feeds)
      - name: Cache OpenWrt SDK
        uses: actions/cache@v5
        with:
          path: openwrt-sdk
          key: ${{ runner.os }}-openwrt-sdk-25.12.4-${{ hashFiles('1_compile.sh', 'mcubridge/Makefile', 'feeds/**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-sdk-25.12.4-

      # [FIX CRÍTICO] Instalar la rama Nightly con el componente de código fuente "rust-src".
      # Esto nos permite compilar la biblioteca estándar de Rust ("std") al vuelo para la arquitectura MIPS
      # omitiendo la construcción nativa y pesada de LLVM del SDK (que causa bloqueos por Out-Of-Memory).
      - name: Install Rust Toolchain (Host Nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget zstd protobuf-compiler
          python3 -m pip install jinja2 pdm-backend hatchling protobuf nanopb grpcio-tools maturin setuptools-rust

      - name: Pre-download Python feed dependencies to bypass PyPI mirror issues
        run: |
          mkdir -p dl
          pip download --no-binary=:all: --no-deps -d dl \
            aiomqtt==3.0.0a1 \
            cobs==1.2.2 \
            cryptography==49.0.0 \
            mqtt5==0.5.0 \
            paho-mqtt==2.1.0 \
            prometheus-client==0.25.0 \
            serialx==1.8.2 \
            structlog==26.1.0 \
            tenacity==9.1.4 \
            uvloop==0.22.1

      - name: Compile Packages
        run: |
          ./1_compile.sh --skip-host-deps

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-apk-packages
          path: bin/
          if-no-files-found: error

  verify-apk:
    name: Verify APK Installation (QEMU MIPS)
    needs: build-apk
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Verification Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-mips python3-pexpect wget e2fsprogs

      - name: Download APK Artifacts
        uses: actions/download-artifact@v8
        with:
          name: openwrt-apk-packages
          path: bin-download/

      - name: Run OpenWrt Smoke Test
        run: |
          # Flatten APKs into a single directory for the test script
          mkdir -p apks-flat
          find bin-download/ -name "*.apk" -exec cp {} apks-flat/ \;
          python3 tools/openwrt_smoke_test.py apks-flat/
