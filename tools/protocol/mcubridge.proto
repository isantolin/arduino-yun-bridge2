syntax = "proto3";

package rpc.pb;

enum Command {
    CMD_INVALID = 0;
    
    // System Commands (0x40-0x4F)
    CMD_GET_VERSION = 0x40;
    CMD_GET_VERSION_RESP = 0x41;
    CMD_GET_FREE_MEMORY = 0x42;
    CMD_GET_FREE_MEMORY_RESP = 0x43;
    CMD_LINK_SYNC = 0x44;
    CMD_LINK_SYNC_RESP = 0x45;
    CMD_LINK_RESET = 0x46;
    CMD_LINK_RESET_RESP = 0x47;
    CMD_GET_CAPABILITIES = 0x48;
    CMD_GET_CAPABILITIES_RESP = 0x49;
    CMD_SET_BAUDRATE = 0x4A;
    CMD_SET_BAUDRATE_RESP = 0x4B;
    CMD_ENTER_BOOTLOADER = 0x4C;
    CMD_XOFF = 0x4E;
    CMD_XON = 0x4F;

    // GPIO Commands (0x50-0x5F)
    CMD_SET_PIN_MODE = 0x50;
    CMD_DIGITAL_WRITE = 0x51;
    CMD_ANALOG_WRITE = 0x52;
    CMD_DIGITAL_READ = 0x53;
    CMD_ANALOG_READ = 0x54;
    CMD_DIGITAL_READ_RESP = 0x55;
    CMD_ANALOG_READ_RESP = 0x56;

    // Console (0x60)
    CMD_CONSOLE_WRITE = 0x60;

    // Datastore (0x70)
    CMD_DATASTORE_PUT = 0x70;
    CMD_DATASTORE_GET = 0x71;
    CMD_DATASTORE_GET_RESP = 0x72;

    // Mailbox (0x80)
    CMD_MAILBOX_READ = 0x80;
    CMD_MAILBOX_PROCESSED = 0x81;
    CMD_MAILBOX_AVAILABLE = 0x82;
    CMD_MAILBOX_PUSH = 0x83;
    CMD_MAILBOX_READ_RESP = 0x84;
    CMD_MAILBOX_AVAILABLE_RESP = 0x85;

    // Filesystem (0x90)
    CMD_FILE_WRITE = 0x90;
    CMD_FILE_READ = 0x91;
    CMD_FILE_REMOVE = 0x92;
    CMD_FILE_READ_RESP = 0x93;

    // Process (0xA0)
    CMD_PROCESS_RUN_ASYNC = 0xA1;
    CMD_PROCESS_POLL = 0xA2;
    CMD_PROCESS_KILL = 0xA3;
    CMD_PROCESS_RUN_ASYNC_RESP = 0xA5;
    CMD_PROCESS_POLL_RESP = 0xA6;

    // SPI (0xB0)
    CMD_SPI_BEGIN = 0xB0;
    CMD_SPI_TRANSFER = 0xB1;
    CMD_SPI_TRANSFER_RESP = 0xB2;
    CMD_SPI_END = 0xB3;
    CMD_SPI_SET_CONFIG = 0xB4;
}

enum Status {
    STATUS_INVALID = 0;
    OK = 0x30;
    ERROR = 0x31;
    CMD_UNKNOWN = 0x32;
    MALFORMED = 0x33;
    OVERFLOW = 0x34;
    CRC_MISMATCH = 0x35;
    TIMEOUT = 0x36;
    NOT_IMPLEMENTED = 0x37;
    ACK = 0x38;
}

message VersionResponse {
    uint32 major = 1;
    uint32 minor = 2;
    uint32 patch = 3;
}

message FreeMemoryResponse {
    uint32 value = 1;
}

message Capabilities {
    uint32 ver = 1;
    uint32 arch = 2;
    uint32 dig = 3;
    uint32 ana = 4;
    bool watchdog = 5;
    bool rle = 6;
    bool debug_frames = 7;
    bool debug_io = 8;
    bool eeprom = 9;
    bool dac = 10;
    bool hw_serial1 = 11;
    bool fpu = 12;
    bool logic_3v3 = 13;
    bool big_buffer = 14;
    bool i2c = 15;
    bool spi = 16;
    bool sd = 17;
}

message PinMode {
    uint32 pin = 1;
    uint32 mode = 2;
}

message DigitalWrite {
    uint32 pin = 1;
    uint32 value = 2;
}

message AnalogWrite {
    uint32 pin = 1;
    uint32 value = 2;
}

message PinRead {
    uint32 pin = 1;
}

message DigitalReadResponse {
    uint32 value = 1;
}

message AnalogReadResponse {
    uint32 value = 1;
}

message ConsoleWrite {
    bytes data = 1;
}

message DatastorePut {
    string key = 1;
    bytes value = 2;
}

message DatastoreGet {
    string key = 1;
}

message DatastoreGetResponse {
    bytes value = 1;
}

message MailboxPush {
    bytes data = 1;
}

message MailboxProcessed {
    uint32 message_id = 1;
}

message MailboxAvailableResponse {
    uint32 count = 1;
}

message MailboxReadResponse {
    bytes content = 1;
}

message FileWrite {
    string path = 1;
    bytes data = 2;
}

message FileRead {
    string path = 1;
}

message FileRemove {
    string path = 1;
}

message FileReadResponse {
    bytes content = 1;
}

message ProcessRunAsync {
    string command = 1;
}

message ProcessRunAsyncResponse {
    uint32 pid = 1;
}

message ProcessPoll {
    uint32 pid = 1;
}

message ProcessPollResponse {
    uint32 status = 1;
    uint32 exit_code = 2;
    bytes stdout_data = 3;
    bytes stderr_data = 4;
    bool finished = 5;
    bool stdout_truncated = 6;
    bool stderr_truncated = 7;
}

message ProcessKill {
    uint32 pid = 1;
}

message GenericResponse {
    string status = 1;
    string message = 2;
}

message StructuredEntry {
    string key = 1;
    oneof value {
        string string_value = 2;
        bytes bytes_value = 3;
        bool bool_value = 4;
        int64 int_value = 5;
        float float_value = 6;
        bool null_value = 7;
    }
}

message StructuredPayload {
    repeated StructuredEntry entries = 1;
}

message AckPacket {
    uint32 command_id = 1;
}

message HandshakeConfig {
    uint32 ack_timeout_ms = 1;
    uint32 ack_retry_limit = 2;
    uint32 response_timeout_ms = 3;
}

message SetBaudratePacket {
    uint32 baudrate = 1;
}

message LinkSync {
    bytes nonce = 1;
    bytes tag = 2;
}

message EnterBootloader {
    uint32 magic = 1;
}

message SpiTransfer {
    bytes data = 1;
}

message SpiTransferResponse {
    bytes data = 1;
}

message SpiConfig {
    uint32 bit_order = 1;
    uint32 data_mode = 2;
    uint32 frequency = 3;
}

message RpcEnvelope {
    uint32 version = 1;
    uint32 command_id = 2;
    uint32 sequence_id = 3;
    bytes nonce = 4;
    bytes tag = 5;
    bytes payload = 6;
}
