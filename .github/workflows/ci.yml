name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 1: Fast Checks & Unit Tests (Matrix)
  # ═══════════════════════════════════════════════════════════════════════════
  tox-checks:
    name: Tox (${{ matrix.env }})
    runs-on: ubuntu-26.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        env: [protocol, deps-sync, lua, cppcheck, typecheck, lint, py313, arduino]
    steps:
      - uses: actions/checkout@v6
      - name: Install protoc
        if: matrix.env == 'protocol' || matrix.env == 'typecheck' || matrix.env == 'lint' || matrix.env == 'py313' || matrix.env == 'arduino' || matrix.env == 'cppcheck'
        run: |
          PROTOC_VERSION=35.1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-x86_64.zip
          curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}
          sudo unzip -o ${PROTOC_ZIP} -d /usr/local
          rm -f ${PROTOC_ZIP}
          protoc --version
      - uses: ./.github/actions/setup-python-tox
        with:
          install-system-deps: 'true'
      - name: Install System Dependencies
        if: matrix.env == 'lua' || matrix.env == 'cppcheck' || matrix.env == 'typecheck' || matrix.env == 'protocol' || matrix.env == 'lint'
        run: |
          sudo apt-get update && sudo apt-get install -y cppcheck luarocks unzip
          python -m pip install protobuf mypy-protobuf
          if [ "${{ matrix.env }}" = "lua" ]; then
            sudo luarocks install luacheck
          fi
      - name: Install Build Tools
        if: matrix.env == 'arduino'
        run: sudo apt-get update && sudo apt-get install -y g++ make
      - name: Check for Hardcoded Secrets
        if: matrix.env == 'lint'
        run: |
          echo "Checking for hardcoded secrets..."
          set +e
          secret_scan_output=$(grep -r -n "serial_shared_secret.*=.*['\"][^'\"]\{8,\}['\"]" mcubridge/uci-defaults/)
          secret_scan_status=$?
          set -e
          if [ "$secret_scan_status" -gt 1 ]; then
            echo "::error::Failed to scan mcubridge/uci-defaults for hardcoded secrets."
            exit "$secret_scan_status"
          fi
          if [ "$secret_scan_status" -eq 0 ]; then
            set +e
            filtered_secret_output=$(printf '%s\n' "$secret_scan_output" | grep -v "6368616e67656d65313233" | grep -v '""' | grep -v "''")
            filtered_secret_status=$?
            set -e
            if [ "$filtered_secret_status" -gt 1 ]; then
              echo "::error::Failed to filter secret scan results."
              exit "$filtered_secret_status"
            fi
            if [ "$filtered_secret_status" -eq 0 ]; then
              printf '%s\n' "$filtered_secret_output"
              echo "::error::Hardcoded secret found!"
              exit 1
            fi
          fi
          echo "✅ No hardcoded secrets"
      - name: Run Tox Environment
        run: tox -e ${{ matrix.env }}

  arduino-examples:
    name: Arduino Examples Compilation
    runs-on: ubuntu-26.04
    needs: [tox-checks]
    timeout-minutes: 10
    env:
      ARDUINO_METRICS_DIR: arduino-logs
    steps:
      - uses: actions/checkout@v6
      - name: Install protoc
        run: |
          PROTOC_VERSION=35.1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-x86_64.zip
          curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}
          sudo unzip -o ${PROTOC_ZIP} -d /usr/local
          rm -f ${PROTOC_ZIP}
          protoc --version
      - name: Setup Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
      - name: Install Arduino Dependencies
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install "Embedded Template Library ETL"
      - uses: ./.github/actions/setup-python-tox
      - name: Compile Examples
        run: |
          mkdir -p arduino-build
          tox -e arduino-examples -- arduino-build
      - name: Profile Memory Usage
        if: always()
        run: |
          mkdir -p arduino-logs
          python tools/arduino_symbol_profiler.py arduino-build --output arduino-logs/symbol_profile.md
      - name: Upload Arduino Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arduino-logs
          path: arduino-logs
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 2: Tests (after fast checks pass) - ~10min total
  # ═══════════════════════════════════════════════════════════════════════════
  unified-tests:
    name: Unified Host Tests & Coverage
    runs-on: ubuntu-26.04
    needs: [tox-checks]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install protoc
        run: |
          PROTOC_VERSION=35.1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-x86_64.zip
          curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}
          sudo unzip -o ${PROTOC_ZIP} -d /usr/local
          rm -f ${PROTOC_ZIP}
          protoc --version
      - uses: ./.github/actions/setup-python-tox
      - name: Install Build Tools
        run: |
          sudo apt-get update && sudo apt-get install -y g++ make
      - name: Setup Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
      - name: Install Arduino Dependencies
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install "Embedded Template Library ETL"
      - name: Run All Tests with Coverage
        run: tox -e coverage
      - name: Upload Python Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-python
          path: coverage/python
          if-no-files-found: ignore
      - name: Upload Arduino Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-arduino-host
          path: coverage/arduino
          if-no-files-found: ignore

  arduino-emulation:
    name: Arduino Emulation (${{ matrix.name }})
    runs-on: ubuntu-26.04
    needs: [tox-checks]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Full Firmware
            firmware: mcubridge-library-arduino/tests/bridge_emulator
            scripts: >-
              mcubridge-client-examples/client_tests/test_smoke_connection.py
              mcubridge-client-examples/led13_test.py
              mcubridge-client-examples/console_test.py
              mcubridge-client-examples/datastore_test.py
              mcubridge-client-examples/fileio_test.py
              mcubridge-client-examples/process_test.py
              mcubridge-client-examples/mailbox_read_test.py
              mcubridge-client-examples/sensor_reader_test.py
              mcubridge-client-examples/all_features_test.py
          - name: Control Sketch
            firmware: mcubridge-library-arduino/tests/bridge_control_emulator
            scripts: >-
              mcubridge-client-examples/client_tests/test_smoke_connection.py
              mcubridge-client-examples/led13_test.py
              mcubridge-client-examples/console_test.py
              mcubridge-client-examples/mailbox_read_test.py
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install protoc
        run: |
          PROTOC_VERSION=35.1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-x86_64.zip
          curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}
          sudo unzip -o ${PROTOC_ZIP} -d /usr/local
          rm -f ${PROTOC_ZIP}
          protoc --version
      - uses: ./.github/actions/setup-python-tox
      - name: Install Python Dependencies
        run: pip install -r requirements/runtime.txt nanopb
      - name: Install Emulation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ socat
      - name: Install Arduino Dependencies
        run: |
          export DUMMY_ARDUINO_LIBS=$(mktemp -d)
          echo "DUMMY_ARDUINO_LIBS=$DUMMY_ARDUINO_LIBS" >> $GITHUB_ENV
          ./mcubridge-library-arduino/tools/install.sh "$DUMMY_ARDUINO_LIBS"
      - name: Compile & Run Emulation
        run: |
          python3 mcubridge-gateway/gateway.py --no-tls --port 8443 &
          gateway_pid=$!
          ./tools/compile_emulator.sh
          python3 -u tools/emulation_runner.py \
            --firmware ${{ matrix.firmware }} \
            ${{ matrix.scripts }}
          kill $gateway_pid

  protocol-fuzzing:
    name: Protocol Stress Test (Fuzzing)
    runs-on: ubuntu-26.04
    needs: [tox-checks]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install protoc
        run: |
          PROTOC_VERSION=35.1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-x86_64.zip
          curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}
          sudo unzip -o ${PROTOC_ZIP} -d /usr/local
          rm -f ${PROTOC_ZIP}
          protoc --version
      - uses: ./.github/actions/setup-python-tox
      - name: Install Emulation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ socat
      - name: Run Fuzzing Campaign
        run: tox -e fuzz

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 3: Consolidation - ~2min
  # ═══════════════════════════════════════════════════════════════════════════
  coverage-report:
    name: Final Summary
    runs-on: ubuntu-26.04
    needs: [unified-tests, arduino-examples, arduino-emulation, protocol-fuzzing]
    if: always()
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Install protoc
        run: |
          PROTOC_VERSION=35.1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-x86_64.zip
          curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}
          sudo unzip -o ${PROTOC_ZIP} -d /usr/local
          rm -f ${PROTOC_ZIP}
          protoc --version
      - uses: ./.github/actions/setup-python-tox

      - name: Download Python Coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-python
          path: coverage/python
        continue-on-error: true

      - name: Download Arduino Coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-arduino-host
          path: coverage/arduino
        continue-on-error: true

      - name: Download Arduino Logs
        uses: actions/download-artifact@v8
        with:
          name: arduino-logs
          path: arduino-logs
        continue-on-error: true

      - name: Verify Artifacts
        run: |
          echo "### Artifact Verification"
          ls -R
          if [ -d "arduino-logs" ]; then
            echo "Contents of arduino-logs:"
            ls -la arduino-logs/
          fi

      - name: Generate Coverage Summary
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements/runtime.txt rich
          python tools/coverage_report.py \
            --output-markdown coverage/coverage-summary.md \
            --output-json coverage/coverage-summary.json \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

      - name: Generate Memory Summary
        run: |
          # 1. Total usage report
          python tools/arduino_memory_report.py arduino-logs \
            --github-step-summary "$GITHUB_STEP_SUMMARY"
          
          # 2. Advanced Symbol Profiling (cat pre-generated report)
          if [ -f arduino-logs/symbol_profile.md ]; then
            cat arduino-logs/symbol_profile.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Generate Daemon Profile
        env:
          PYTHONPATH: mcubridge:mcubridge-client-examples:typings
        run: |
          # 1. Mandatory Protocol Generation (Required for imports)
          # Use tox to ensure we have all generator deps, but we need them in this env too
          pip install jinja2 nanopb
          python tools/protocol/generate.py \
            --spec tools/protocol/mcubridge.proto \
            --py mcubridge/mcubridge/protocol/protocol.py \
            --py-client mcubridge-client-examples/mcubridge_client/protocol.py
          
          # 2. Standard performance profile
          python tools/daemon_profile_report.py \
            --iterations 2000 \
            --json coverage/daemon-profile.json \
            --github-step-summary "$GITHUB_STEP_SUMMARY"
          
          # 3. Advanced Runtime Profiling (Architecture, Memory, Time & Size)
          python tools/python_runtime_profiler.py \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

      - name: Upload Combined Coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-combined
          path: coverage/
          if-no-files-found: ignore
