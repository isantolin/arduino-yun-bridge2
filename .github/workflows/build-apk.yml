name: Build OpenWrt APK Packages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    name: Compile APKs for OpenWrt 25.12.0
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget zstd
          python3 -m pip install msgspec typer

      - name: Compile Packages
        run: |
          ./1_compile.sh --skip-host-deps

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-apk-packages
          path: bin/
          if-no-files-found: error
