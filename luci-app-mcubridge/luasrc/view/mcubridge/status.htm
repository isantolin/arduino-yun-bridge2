<%+header%>

<script type="text/javascript">//<![CDATA[

    const T_NO_STATUS_AVAILABLE = '<%=translate("No status available")%>';
    const T_ERROR_PROCESSING_DATA = '<%=translate("Error processing data.")%>';
    const STATUS_URL = '<%=luci.dispatcher.build_url("admin", "services", "mcubridge", "status_raw")%>';

    async function fetchStatus() {
        var el = document.getElementById('status-content');
        try {
            var resp = await fetch(STATUS_URL);
            var data = await resp.json();
            el.textContent = JSON.stringify(data, null, 2);
        } catch (e) {
            el.textContent = T_ERROR_PROCESSING_DATA;
        }
    }

    window.addEventListener('load', function() {
        fetchStatus();
        setInterval(fetchStatus, 5000);
    });
//]]></script>

<h2><%:McuBridge Daemon Status%></h2>
<p>
    <em>
        <%:Status snapshot is read from /tmp/mcubridge_status.json (tmpfs) and may be empty after reboot or while the daemon is starting.%>
    </em>
</p>
<div id="daemon-status">
    <pre id="status-content"><%=translate("Loading status...")%></pre>
</div>

<%+footer%>
