[tox]
envlist = py313, protocol, lint, typecheck, cppcheck, fuzz
isolated_build = false
skip_missing_interpreters = true
skipsdist = true

[testenv]
basepython = python3.13
setenv =
    PYTHONPATH = {toxinidir}/typings:{toxinidir}/typings/stubs:{toxinidir}:{toxinidir}/mcubridge:{toxinidir}/mcubridge-client-examples
passenv =
    LC_ALL
    LANG
    PATH
allowlist_externals =
    ./tools/ci_arduino_host_tests.sh
    ./tools/compile_emulator.sh
    ./tools/ci_fuzz.sh
    sh
    cat
    xargs
    kill
    rm
    sleep
    pkill
    mosquitto
    cppcheck
    black
    ruff
    pyright
    bash
deps =
    -r requirements/runtime.txt
    jinja2
    pytest
    pytest-asyncio
    pytest-timeout
    pytest-xdist
    msgspec
    protobuf
    nanopb
    grpcio-tools
    tenacity
    aiomqtt
    paho-mqtt
    transitions
    rich
    prometheus-client
    pyserial-asyncio-fast
    cryptography
    sh
    ruff
    flake8
    pyright
    black

[testenv:protocol]
deps =
    protobuf
    nanopb
    grpcio-tools
    -r requirements/runtime.txt
    jinja2
    black
commands =
    python tools/protocol/generate.py --spec tools/protocol/spec.toml --py mcubridge/mcubridge/protocol/protocol.py --cpp mcubridge-library-arduino/src/protocol/rpc_protocol.h --cpp-structs mcubridge-library-arduino/src/protocol/rpc_structs.h --py-client mcubridge-client-examples/mcubridge_client/protocol.py --structures mcubridge/mcubridge/protocol/structures.py

[testenv:lint]
commands_pre =
    {[testenv:protocol]commands}
commands =
    black --target-version py313 .
    ruff check --fix --unsafe-fixes mcubridge mcubridge-client-examples tools mcubridge/scripts
    ruff check mcubridge mcubridge-client-examples tools mcubridge/scripts

[testenv:typecheck]
commands_pre =
    {[testenv:protocol]commands}
commands =
    black --target-version py313 .
    ruff check --fix --unsafe-fixes mcubridge mcubridge-client-examples tools mcubridge/scripts
    pyright

[testenv:py313]
commands_pre =
    {[testenv:protocol]commands}
commands =
    python -m pytest -n 5 --basetemp=.tmp_tests mcubridge/tests mcubridge-client-examples/client_tests

[testenv:cppcheck]
commands_pre =
    {[testenv:protocol]commands}
commands =
    cppcheck --enable=all --suppress=missingIncludeSystem \
             --suppressions-list=tools/cppcheck_suppressions.txt \
             --suppress=normalCheckLevelMaxBranches \
             --suppress=checkersReport \
             --suppress=unusedFunction \
             --suppress=unmatchedSuppression \
             --error-exitcode=1 \
             --std=c++17 -DPROGMEM="" -I mcubridge-library-arduino/src \
             mcubridge-library-arduino/src

[testenv:arduino]
commands_pre =
    {[testenv:protocol]commands}
commands =
    ./tools/ci_arduino_host_tests.sh

[testenv:e2e]
setenv =
    MCUBRIDGE_LOG_STREAM = 1
commands_pre =
    {[testenv:protocol]commands}
commands =
    ./tools/compile_emulator.sh
    sh -c 'pkill mosquitto || true; sleep 2; mosquitto -d -p 1883 >/dev/null 2>&1 || true'
    sleep 5
    python tools/emulation_runner.py --firmware mcubridge-library-arduino/tests/bridge_emulator \
        mcubridge-client-examples/process_test.py \
        mcubridge-client-examples/mailbox_read_test.py \
        mcubridge-client-examples/sensor_reader_test.py \
        mcubridge-client-examples/all_features_test.py \
        mcubridge-client-examples/console_test.py \
        mcubridge-client-examples/datastore_test.py \
        mcubridge-client-examples/fileio_test.py \
        mcubridge-client-examples/led13_test.py \
        mcubridge-client-examples/bootloader_test.py \
        mcubridge-client-examples/spi_test.py
    sh -c 'pkill mosquitto || true'

[testenv:deps-sync]
commands =
    python tools/sync_runtime_deps.py --check --check-latest

[testenv:lua]
deps =
allowlist_externals =
    luacheck
commands =
    luacheck luci-app-mcubridge/luasrc

[testenv:coverage]
deps =
    {[testenv]deps}
    pytest-cov
    gcovr
    coverage==7.13.5
setenv =
    PYTHON_COVERAGE_MIN = 85
allowlist_externals =
    {[testenv]allowlist_externals}
    ./tools/coverage_python.sh
    ./tools/coverage_arduino.sh
    bash
commands_pre =
    {[testenv:protocol]commands}
commands =
    bash -c 'PYTHON_EXE={envpython} ./tools/coverage_python.sh & P1=$!; ./tools/coverage_arduino.sh & P2=$!; wait $P1; S1=$?; wait $P2; S2=$?; if [ $S1 -ne 0 ]; then exit $S1; elif [ $S2 -ne 0 ]; then exit $S2; else exit 0; fi'

[testenv:arduino-examples]
passenv =
    {[testenv]passenv}
    ARDUINO_METRICS_DIR
allowlist_externals =
    {[testenv]allowlist_externals}
    ./tools/ci_arduino.sh
commands =
    ./tools/ci_arduino.sh {posargs}

[testenv:fuzz]
commands_pre =
    {[testenv:protocol]commands}
commands =
    ./tools/ci_fuzz.sh
