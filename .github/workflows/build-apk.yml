name: Build OpenWrt APK Packages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: Compile APKs for OpenWrt 25.12.0
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Cache OpenWrt SDK
        uses: actions/cache@v4
        with:
          path: |
            openwrt-sdk
            dl
          key: ${{ runner.os }}-openwrt-sdk-25.12.0-${{ hashFiles('1_compile.sh', 'mcubridge/Makefile', 'feeds/**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-sdk-25.12.0-

      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget zstd protobuf-compiler
          python3 -m pip install msgspec typer nanopb grpcio-tools jinja2

      - name: Compile Packages
        run: |
          ./1_compile.sh --skip-host-deps

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-apk-packages
          path: bin/
          if-no-files-found: error

  verify-apk:
    name: Verify APK Installation (QEMU MIPS)
    needs: build-apk
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Verification Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-mips python3-pexpect wget e2fsprogs

      - name: Download APK Artifacts
        uses: actions/download-artifact@v8
        with:
          name: openwrt-apk-packages
          path: bin-download/

      - name: Run OpenWrt Smoke Test
        run: |
          # The APKs might be deep in the directory structure depending on how they were uploaded
          # We search for them and put them in a flat directory for the script
          mkdir -p apks-flat
          find bin-download/ -name "*.apk" -exec cp {} apks-flat/ \;
          python3 tools/openwrt_smoke_test.py apks-flat/
