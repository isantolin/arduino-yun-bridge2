[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mcubridge"
version = "2.5.1"
description = "Arduino MCU Bridge Protocol for OpenWrt (Python 3.13)"
requires-python = ">=3.13"
dependencies = [
    # Using high-performance pyserial-asyncio-fast for zero-overhead serial I/O
    "paho-mqtt==2.1.0",      # STRICT: Required for CallbackAPIVersion.VERSION2
    "aiomqtt==2.5.1",        # STRICT: Python 3.13 compatible, validated against paho 2.1.0
    "cobs==1.2.2",
    "psutil==7.2.2",
    "prometheus-client==0.24.1",
    "pyserial-asyncio-fast==0.16",
    "tenacity==9.1.4",
    "msgspec==0.20.0",
    "cryptography==46.0.5",
    "construct==2.10.70",
    "transitions==0.9.3",
    "sh==2.2.2",
    "uvloop==0.22.1"
]

[tool.setuptools]
packages = ["mcubridge"]
package-dir = {"" = "mcubridge"}

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q -W error"
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
log_cli = true
log_cli_level = "INFO"
testpaths = ["mcubridge/tests"]
pythonpath = ["stubs", ".", "mcubridge"]
norecursedirs = ["openwrt-sdk", "feeds", ".git", ".tox", ".venv*"]
markers = ["fuzz: mark a test as a fuzz test"]

[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.13"
stubPath = "stubs"
extraPaths = ["mcubridge"]
include = [
    "mcubridge/mcubridge",
    "mcubridge-client-examples/mcubridge_client",
    "mcubridge/scripts",
    "stubs"
]
strict = [
    "mcubridge/mcubridge",
    "mcubridge-client-examples/mcubridge_client",
    "mcubridge/scripts",
    "stubs"
]
exclude = [
    "openwrt-sdk",
    ".tox",
    ".venv",
    ".venv_debug",
    "**/__pycache__",
    "**/node_modules",
    "**/.*"
]
reportMissingImports = true
reportMissingTypeStubs = false

[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "C90", "A", "PLW"]
# PLW0108: typed lambdas (e.g. lambda: set[int]()) are required by pyright strict
ignore = ["PLW0108"]

[tool.ruff.lint.per-file-ignores]
# Code generators are inherently complex: exclude from mccabe checks
"tools/protocol/generate.py" = ["C901"]
# Test helper functions can have complex logic for static analysis
"mcubridge/tests/test_repo_policy_gates.py" = ["C901"]

[tool.ruff.lint.mccabe]
# [QUALITY] Reduced from 50 to 25 for SIL-2 compliance and maintainability
max-complexity = 25
