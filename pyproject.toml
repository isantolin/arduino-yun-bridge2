[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mcubridge"
version = "2.8.5"
description = "Arduino MCU Bridge Protocol for OpenWrt (Python 3.13)"
requires-python = ">=3.13"
dependencies = [
    "aiomqtt==2.5.1",
    "click==8.3.1",
    "cobs==1.2.2",
    "construct==2.10.70",
    "cryptography==46.0.5",
    "markdown-it-py==4.0.0",
    "mdurl==0.1.2",
    "msgspec==0.20.0",
    "paho-mqtt==2.1.0",
    "persist-queue==1.1.0",
    "prometheus-client==0.24.1",
    "psutil==7.2.2",
    "pygments==2.19.1",
    "pyserial-asyncio-fast==0.16",
    "rich==14.3.3",
    "sh==2.2.2",
    "shellingham==1.5.4",
    "structlog==25.5.0",
    "svcs==25.1.0",
    "tenacity==9.1.4",
    "transitions==0.9.3",
    "typer[all]==0.24.1",
    "uvloop==0.22.1",
]

[tool.setuptools]
packages = ["mcubridge"]
package-dir = {"" = "mcubridge"}

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --timeout=10 --timeout_method=thread"
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
log_cli = true
log_cli_level = "INFO"
testpaths = ["mcubridge/tests"]
pythonpath = ["typings", ".", "mcubridge"]
norecursedirs = ["openwrt-sdk", "feeds", ".git", ".tox", ".venv*"]
markers = ["fuzz: mark a test as a fuzz test"]

[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.13"
stubPath = "typings"
extraPaths = ["mcubridge", "mcubridge/stubs"]
include = [
    "mcubridge/mcubridge",
    "mcubridge-client-examples/mcubridge_client",
    "mcubridge/scripts"
]
strict = [
    "mcubridge/mcubridge",
    "mcubridge-client-examples/mcubridge_client",
    "mcubridge/scripts"
]
exclude = [
    "openwrt-sdk",
    ".tox",
    ".venv",
    ".venv_debug",
    "**/__pycache__",
    "**/node_modules",
    "**/*_pb2.py",
    "**/.*"
]
reportMissingImports = true
reportMissingTypeStubs = true

[tool.ruff]
target-version = "py313"
line-length = 120
exclude = ["*_pb2.py", "*_pb2.pyi", "typings"]

[tool.ruff.lint]
select = ["E", "F", "W", "C90", "A", "PLW"]

[tool.ruff.lint.per-file-ignores]

[tool.ruff.lint.mccabe]
# [QUALITY] Reduced from 50 to 25 for SIL-2 compliance and maintainability
max-complexity = 25
