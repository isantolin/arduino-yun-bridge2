# Single source of truth for McuBridge daemon dependencies.

[[dependency]]
name = "python3"
openwrt = "python3"
pip = ""
rationale = "Base interpreter shipped on the target image"

[[dependency]]
name = "aiomqtt"
openwrt = "python3-aiomqtt"
pip = "aiomqtt==2.5.1"
rationale = "Async MQTT v5 client used for runtime telemetry (Python 3.13 compatible)"

[[dependency]]
name = "paho-mqtt"
openwrt = "python3-paho-mqtt"
pip = "paho-mqtt==2.1.0"
rationale = "Synchronous MQTT client for legacy CGI scripts"

[[dependency]]
name = "python-cobs"
openwrt = "python3-cobs"
pip = "cobs==1.2.2"
rationale = "COBS framing for the RPC protocol"

[[dependency]]
name = "construct"
openwrt = "python3-construct"
pip = "construct==2.10.70"
rationale = "Declarative byte serialization for the frame layer"

[[dependency]]
name = "jinja2"
openwrt = "python3-jinja2"
pip = "jinja2==3.1.6"
rationale = "Template engine for professional and auditable code generation [BUILD-ONLY]"

[[dependency]]
name = "msgspec"
openwrt = "python3-msgspec"
pip = "msgspec==0.21.1"
rationale = "High-performance JSON/MessagePack library"

[[dependency]]
name = "psutil"
openwrt = "python3-psutil"
pip = "psutil==7.2.2"
rationale = "Process supervision and zombie cleanup"

[[dependency]]
name = "prometheus-client"
openwrt = "python3-prometheus-client"
pip = "prometheus-client==0.25.0"
rationale = "Expose runtime metrics via the Prometheus Python client"

[[dependency]]
name = "pyserial-asyncio-fast"
openwrt = "python3-pyserial-asyncio-fast"
pip = "pyserial-asyncio-fast==0.16"
rationale = "Zero-Overhead Async I/O for Serial"

[[dependency]]
name = "tenacity"
openwrt = "python3-tenacity"
pip = "tenacity==9.1.4"
rationale = "Declarative retrying library for robust task supervision and handshake"

[[dependency]]
name = "uvloop"
openwrt = "python3-uvloop"
pip = "uvloop==0.22.1"
rationale = "Ultra-fast asyncio event loop implementation (libuv)"

[[dependency]]
name = "cryptography"
openwrt = "python3-cryptography"
pip = "cryptography==48.0.0"
rationale = "HKDF and HMAC for handshake security (SIL-2 compliance)"

[[dependency]]
name = "structlog"
openwrt = "python3-structlog"
pip = "structlog==25.5.0"
rationale = "Structured logging with JSON output for production syslog"

[[dependency]]
name = "diskcache"
openwrt = "python3-diskcache"
pip = "diskcache==5.6.3"
rationale = "SQLite-backed disk cache with native deque support"

[[dependency]]
name = "mosquitto-client"
openwrt = "mosquitto-client"
pip = ""
rationale = "CLI MQTT tools used by credential rotation and health-check scripts"

[[dependency]]
name = "xxd"
openwrt = "xxd"
pip = ""
rationale = "Hex-dump utility used by diagnostic scripts [BUILD-ONLY]"
