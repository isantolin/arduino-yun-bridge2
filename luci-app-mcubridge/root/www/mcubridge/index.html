<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>YunWebUI v2 - LED 13 Test</title>
	<style>
		body { font-family: sans-serif; margin: 2em; background-color: #f4f6f9; color: #333; }
		.container { max-width: 400px; margin: 0 auto; padding: 2em; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
		h1 { text-align: center; color: #00599c; margin-bottom: 0.5em; }
		h2 { text-align: center; font-size: 1.1em; color: #666; margin-bottom: 2em; }
		.btn-group { display: flex; justify-content: space-around; margin-bottom: 2em; }
		button { padding: 0.8em 2em; font-size: 1.1em; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; font-weight: bold; }
		.btn-on { background-color: #28a745; color: white; }
		.btn-on:hover { background-color: #218838; }
		.btn-off { background-color: #dc3545; color: white; }
		.btn-off:hover { background-color: #c82333; }
		#status { text-align: center; padding: 1em; background-color: #e9ecef; border-radius: 4px; font-family: monospace; font-size: 1em; }
	</style>
</head>
<body>
	<div class="container">
		<h1>YunWebUI v2</h1>
		<h2>LED 13 Control (UNIX Socket REST API)</h2>
		<div class="btn-group">
			<button class="btn-on" onclick="led13('ON')">Turn ON</button>
			<button class="btn-off" onclick="led13('OFF')">Turn OFF</button>
		</div>
		<div id="status">Status: Ready</div>
	</div>

	<script>
		function led13(state) {
			const statusDiv = document.getElementById('status');
			statusDiv.innerText = `Sending command: ${state}...`;

			fetch('/cgi-bin/luci/admin/services/mcubridge/api/pin/13', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({ state: state })
			})
			.then(response => {
				if (!response.ok) {
					throw new Error(`HTTP error! status: ${response.status}`);
				}
				return response.json();
			})
			.then(data => {
				if (data.status === 'ok') {
					statusDiv.innerText = `LED 13 State: ${data.state} (Success)`;
				} else {
					statusDiv.innerText = `Error: ${data.message || 'Unknown error'}`;
				}
			})
			.catch(err => {
				statusDiv.innerText = `API Error: ${err.message}`;
			});
		}
	</script>
</body>
</html>
