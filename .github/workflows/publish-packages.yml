name: Publish Packages to GitHub Packages & GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: Python Wheel Package -> GitHub Packages PyPI Registry
  # ═══════════════════════════════════════════════════════════════════════════
  publish-python-wheel:
    name: Publish Python Wheel to GitHub Packages
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install protoc & Dependencies
        run: |
          PROTOC_TAG=36.0-rc1
          PROTOC_VERSION=36.0-rc-1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-x86_64.zip
          curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_TAG}/${PROTOC_ZIP}
          sudo unzip -o ${PROTOC_ZIP} -d /usr/local
          rm -f ${PROTOC_ZIP}
          python -m pip install --upgrade pip build twine setuptools wheel protobuf nanopb jinja2

      - name: Generate Protocol Bindings
        run: |
          python tools/protocol/generate.py \
            --spec tools/protocol/mcubridge.proto \
            --py mcubridge/mcubridge/protocol/protocol.py \
            --cpp mcubridge-library-arduino/src/protocol/rpc_protocol.h \
            --cpp-structs mcubridge-library-arduino/src/protocol/rpc_structs.h \
            --py-client mcubridge-client-examples/mcubridge_client/protocol.py

      - name: Build Python Package (sdist & wheel)
        run: python -m build

      - name: Publish to GitHub Packages PyPI
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          twine upload --repository-url https://pypi.pkg.github.com/${{ github.repository_owner }} dist/* --skip-existing

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: OpenWrt APK Feed OCI Container -> GHCR (ghcr.io)
  # ═══════════════════════════════════════════════════════════════════════════
  publish-openwrt-apk-feed-oci:
    name: Publish OpenWrt APK Feed to GHCR
    runs-on: ubuntu-26.04
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v6

      - name: Cache Downloads
        uses: actions/cache@v5
        with:
          path: dl
          key: ${{ runner.os }}-openwrt-dl-25.12.5
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      - name: Cache Host Toolchain
        uses: actions/cache@v5
        with:
          path: |
            openwrt-sdk/staging_dir/hostpkg
            openwrt-sdk/staging_dir/host
          key: ${{ runner.os }}-openwrt-host-25.12.5-${{ hashFiles('1_compile.sh', 'mcubridge-gateway/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-host-25.12.5-

      - name: Cache OpenWrt SDK
        uses: actions/cache@v5
        with:
          path: openwrt-sdk
          key: ${{ runner.os }}-openwrt-sdk-25.12.5-${{ hashFiles('1_compile.sh', 'mcubridge/Makefile', 'mcubridge-gateway/Makefile', 'feeds/**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-sdk-25.12.5-

      - name: Install Rust Toolchain (Host Nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget zstd protobuf-compiler rpm
          python3 -m pip install jinja2 pdm-backend hatchling protobuf nanopb grpcio-tools maturin setuptools-rust grpclib

      - name: Pre-download Python feed dependencies
        run: |
          mkdir -p dl
          pip download --no-binary=:all: --no-deps -d dl \
            cobs==1.2.2 \
            cryptography==49.0.0 \
            prometheus-client==0.25.0 \
            serialx==1.8.2 \
            structlog==26.1.0 \
            tenacity==9.1.4 \
            uvloop==0.22.1

      - name: Compile OpenWrt APKs
        run: |
          ./1_compile.sh --skip-host-deps

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Dockerfile for OpenWrt APK Feed
        run: |
          cat << 'EOF' > Dockerfile.apk-feed
          FROM nginx:alpine
          COPY bin/ /usr/share/nginx/html/
          EXPOSE 80
          EOF

      - name: Extract Metadata & Version Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/openwrt-apk-feed
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and Push OCI Container to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.apk-feed
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
