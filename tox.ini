[tox]
envlist = py313, protocol, lint, typecheck, cppcheck, deps-sync, coverage, e2e, lua
isolated_build = false
skip_missing_interpreters = true
skipsdist = true

[testenv]
basepython = python3.13
setenv =
    PYTHONPATH = {toxinidir}/typings:{toxinidir}:{toxinidir}/mcubridge:{toxinidir}/mcubridge-client-examples
passenv =
    LC_ALL
    LANG
    ARDUINO_METRICS_DIR
allowlist_externals =
    ./tools/ci_arduino_host_tests.sh
    ./tools/compile_emulator.sh
    ./tools/coverage_python.sh
    ./tools/coverage_arduino.sh
    ./tools/ci_arduino.sh
    sh
    cat
    xargs
    kill
    rm
    sleep
    mosquitto
    cppcheck
    nc
    bash
    luacheck
deps =
    -r requirements/runtime.txt
    structlog
    svcs
    uvloop
    cobs
    diskcache
    jinja2
    pytest
    pytest-asyncio
    pytest-timeout
    pytest-xdist
    aiomqtt
    tenacity
    transitions
    paho-mqtt
    construct
    msgspec
    pyright
    flake8
    ruff
    sh
    typer[all]
    cryptography
    prometheus-client
    psutil
    pyserial-asyncio-fast
    rich
commands =
    python -m pytest -n auto mcubridge/tests mcubridge-client-examples/client_tests

[testenv:protocol]
deps =
    {[testenv]deps}
commands =
    python tools/protocol/generate.py --spec tools/protocol/spec.toml --py mcubridge/mcubridge/protocol/protocol.py --cpp mcubridge-library-arduino/src/protocol/rpc_protocol.h --cpp-structs mcubridge-library-arduino/src/protocol/rpc_structs.h --py-client mcubridge-client-examples/mcubridge_client/protocol.py --structures mcubridge/mcubridge/protocol/structures.py

[testenv:lint]
deps =
    {[testenv]deps}
commands_pre =
    {[testenv:protocol]commands}
commands =
    ruff check mcubridge mcubridge-client-examples tools mcubridge/scripts
    ruff format --check mcubridge mcubridge-client-examples tools mcubridge/scripts

[testenv:typecheck]
deps =
    {[testenv]deps}
commands_pre =
    {[testenv:protocol]commands}
    pyright --createstub construct
    pyright --createstub construct.core
    pyright --createstub diskcache
    pyright --createstub transitions
commands =
    pyright

[testenv:cppcheck]
commands =
    cppcheck --enable=all --suppress=missingIncludeSystem --std=c++17 -DPROGMEM= -I mcubridge-library-arduino/src mcubridge-library-arduino/src

[testenv:arduino]
commands_pre =
    {[testenv:protocol]commands}
commands =
    ./tools/ci_arduino_host_tests.sh

[testenv:e2e]
deps =
    {[testenv]deps}
commands_pre =
    {[testenv:protocol]commands}
commands =
    ./tools/compile_emulator.sh
    sh -c 'mosquitto -d -c /tmp/mosquitto_e2e.conf -P /tmp/mosquitto_e2e.pid >/dev/null 2>&1 || true'
    sh -c 'for i in $(seq 1 10); do if nc -z 127.0.0.1 1883; then exit 0; fi; sleep 1; done; exit 1'
    python3 tools/emulation_runner.py --firmware mcubridge-library-arduino/tests/bridge_emulator \
        "mcubridge-client-examples/process_test.py --host 127.0.0.1" \
        "mcubridge-client-examples/mailbox_read_test.py --host 127.0.0.1" \
        "mcubridge-client-examples/sensor_reader_test.py --host 127.0.0.1" \
        "mcubridge-client-examples/all_features_test.py --host 127.0.0.1" \
        "mcubridge-client-examples/console_test.py --host 127.0.0.1" \
        "mcubridge-client-examples/datastore_test.py --host 127.0.0.1" \
        "mcubridge-client-examples/fileio_test.py --host 127.0.0.1" \
        "mcubridge-client-examples/led13_test.py --host 127.0.0.1"
    - sh -c "cat /tmp/mosquitto_e2e.pid | xargs kill 2>/dev/null || true"
    - rm -f /tmp/mosquitto_e2e.pid

[testenv:deps-sync]
commands =
    python tools/sync_runtime_deps.py --check --update

[testenv:coverage]
deps =
    {[testenv]deps}
    pytest-cov
    gcovr
    coverage==7.13.5
commands_pre =
    {[testenv:protocol]commands}
commands =
    bash -c './tools/coverage_python.sh & P1=$!; ./tools/coverage_arduino.sh & P2=$!; wait $P1; S1=$?; wait $P2; S2=$?; if [ $S1 -ne 0 ]; then exit $S1; elif [ $S2 -ne 0 ]; then exit $S2; else exit 0; fi'

[testenv:lua]
deps =
commands =
    luacheck luci-app-mcubridge/luasrc

[testenv:arduino-examples]
commands =
    ./tools/ci_arduino.sh
