name: Build OpenWrt APK Packages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: Compile APKs for OpenWrt 25.12.2
    runs-on: ubuntu-22.04
    timeout-minutes: 330
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Cache layer 1: Downloaded source tarballs (very stable, survives build script changes)
      - name: Cache Downloads
        uses: actions/cache@v4
        with:
          path: dl
          key: ${{ runner.os }}-openwrt-dl-25.12.2
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      # Cache layer 2: Host toolchain (SDK Python, host tools — expensive to rebuild, rarely changes)
      - name: Cache Host Toolchain
        uses: actions/cache@v4
        with:
          path: |
            openwrt-sdk/staging_dir/hostpkg
            openwrt-sdk/staging_dir/host
          key: ${{ runner.os }}-openwrt-host-25.12.2-${{ hashFiles('1_compile.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-host-25.12.2-

      # Cache layer 3: Full SDK (staging_dir/target, build_dir, feeds)
      - name: Cache OpenWrt SDK
        uses: actions/cache@v4
        with:
          path: openwrt-sdk
          key: ${{ runner.os }}-openwrt-sdk-25.12.2-${{ hashFiles('1_compile.sh', 'mcubridge/Makefile', 'feeds/**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-sdk-25.12.2-

      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget zstd protobuf-compiler
          python3 -m pip install msgspec typer nanopb grpcio-tools jinja2 pdm-backend hatchling

      - name: Compile Packages
        run: |
          ./1_compile.sh --skip-host-deps

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-apk-packages
          path: bin/
          if-no-files-found: error

  verify-apk:
    name: Verify APK Installation (QEMU MIPS)
    needs: build-apk
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Verification Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-mips python3-pexpect wget e2fsprogs

      - name: Download APK Artifacts
        uses: actions/download-artifact@v8
        with:
          name: openwrt-apk-packages
          path: bin-download/

      - name: Run OpenWrt Smoke Test
        run: |
          # Flatten APKs into a single directory for the test script
          mkdir -p apks-flat
          find bin-download/ -name "*.apk" -exec cp {} apks-flat/ \;
          python3 tools/openwrt_smoke_test.py apks-flat/
