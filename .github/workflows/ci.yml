name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 1: Fast Checks (parallel) - ~3min total
  # ═══════════════════════════════════════════════════════════════════════════
  security-check:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Check for Hardcoded Secrets
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -r "serial_shared_secret.*=.*['\"][^'\"]\{8,\}['\"]" \
               --include="mcubridge" mcubridge/uci-defaults/ 2>/dev/null | \
               grep -v "6368616e67656d65313233" | grep -v '""' | grep -v "''"; then
            echo "::error::Hardcoded secret found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-tox
        with:
          install-system-deps: 'true'
      - run: tox -e lint

  cppcheck:
    name: C++ Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-tox
      - name: Install Cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - run: tox -e cppcheck

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-tox
      - run: tox -e typecheck

  deps-sync:
    name: Deps Sync
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-tox
      - run: tox -e deps-sync

  protocol-sync:
    name: Protocol Sync
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-tox
      - run: tox -e protocol

  lua-lint:
    name: Lua Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-tox
        with:
          install-system-deps: 'true'
      - run: tox -e lua

  arduino-examples:
    name: Arduino Examples Compilation
    runs-on: ubuntu-latest
    needs: [lint, cppcheck]
    timeout-minutes: 10
    env:
      ARDUINO_METRICS_DIR: arduino-logs
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-tox
      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2
      - name: Install Arduino Dependencies
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install PacketSerial "Embedded Template Library ETL"
      - name: Compile Examples
        run: tox -e arduino-examples
      - name: Upload Arduino Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arduino-logs
          path: arduino-logs
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 2: Tests (after fast checks pass) - ~15min total
  # ═══════════════════════════════════════════════════════════════════════════
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck, protocol-sync, deps-sync]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-tox
      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2
      - name: Install Arduino Dependencies
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install PacketSerial "Embedded Template Library ETL"
      - name: Run Tests with Coverage
        run: tox -e coverage
      - name: Upload Python Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python
          path: coverage/python
          if-no-files-found: ignore

  arduino-host:
    name: Arduino Host Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-tox
      - name: Install Python Tooling Deps
        run: pip install msgspec jinja2 typer[all] gcovr
      - name: Install Build Tools
        run: |
          sudo apt-get update && sudo apt-get install -y g++ make
      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2
      - name: Install Arduino Dependencies
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install PacketSerial "Embedded Template Library ETL"
      - name: Run Host Tests
        run: ./tools/ci_arduino_host_tests.sh
      - name: Run Coverage
        run: ./tools/coverage_arduino.sh
      - name: Upload Arduino Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-arduino-host
          path: coverage/arduino
          if-no-files-found: ignore

  arduino-emulation:
    name: Arduino Emulation (${{ matrix.firmware }})
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        firmware: [mcubridge-library-arduino/tests/bridge_emulator, mcubridge-library-arduino/tests/bridge_control_emulator]
    timeout-minutes: 20
    services:
      mosquitto:
        image: eclipse-mosquitto:2
        ports:
          - 1883:1883
        options: >-
          --name mosquitto
          --health-cmd "mosquitto_sub -t '$SYS/#' -C 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-tox
      - name: Install Python Dependencies
        run: pip install -r requirements/runtime.txt
      - name: Install Emulation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ socat
      - name: Install Arduino Dependencies
        run: |
          export DUMMY_ARDUINO_LIBS=$(mktemp -d)
          echo "DUMMY_ARDUINO_LIBS=$DUMMY_ARDUINO_LIBS" >> $GITHUB_ENV
          ./mcubridge-library-arduino/tools/install.sh "$DUMMY_ARDUINO_LIBS"
      - name: Compile & Run Emulation
        run: |
          ./tools/compile_emulator.sh
          python3 -u tools/emulation_runner.py \
            --firmware ${{ matrix.firmware }} \
            mcubridge-client-examples/led13_test.py \
            mcubridge-client-examples/console_test.py \
            mcubridge-client-examples/datastore_test.py \
            mcubridge-client-examples/fileio_test.py \
            mcubridge-client-examples/mailbox_read_test.py \
            mcubridge-client-examples/process_test.py \
            mcubridge-client-examples/sensor_reader_test.py \
            mcubridge-client-examples/all_features_test.py

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 3: Consolidation - ~2min
  # ═══════════════════════════════════════════════════════════════════════════
  coverage-report:
    name: Final Summary
    runs-on: ubuntu-latest
    needs: [python-tests, arduino-host, arduino-examples, arduino-emulation]
    if: always()
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-tox

      - name: Download Python Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-python
          path: coverage/python
        continue-on-error: true

      - name: Download Arduino Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-arduino-host
          path: coverage/arduino
        continue-on-error: true

      - name: Download Arduino Logs
        uses: actions/download-artifact@v4
        with:
          name: arduino-logs
          path: arduino-logs
        continue-on-error: true

      - name: Generate Coverage Summary
        run: |
          pip install msgspec typer rich
          python tools/coverage_report.py \
            --output-markdown coverage/coverage-summary.md \
            --output-json coverage/coverage-summary.json \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

      - name: Generate Memory Summary
        run: |
          python tools/arduino_memory_report.py arduino-logs \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

      - name: Upload Combined Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: coverage/
          if-no-files-found: ignore
