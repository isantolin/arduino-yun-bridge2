[tox]
envlist = py313, protocol, lint, typecheck, cppcheck
isolated_build = false
skip_missing_interpreters = true
skipsdist = true

[testenv]
basepython = python3.13
setenv =
    PYTHONPATH = {toxinidir}/typings:{toxinidir}:{toxinidir}/mcubridge:{toxinidir}/mcubridge-client-examples
passenv =
    LC_ALL
    LANG
allowlist_externals =
    ./tools/ci_arduino_host_tests.sh
    ./tools/compile_emulator.sh
    sh
    cat
    xargs
    kill
    rm
    sleep
    mosquitto
    cppcheck
deps =
    -r requirements/runtime.txt
    jinja2
    pytest
    pytest-asyncio
    pytest-timeout
    pytest-xdist
    msgspec
    construct
    jinja2
    typer[all]
    psutil
    tenacity
    aiomqtt
    paho-mqtt
    transitions
    rich
    prometheus-client
    pyserial-asyncio-fast
    cryptography
    sh
    ruff
    flake8
    pyright

[testenv:protocol]
deps =
    -r requirements/runtime.txt
    jinja2
commands =
    python tools/protocol/generate.py --spec tools/protocol/spec.toml --py mcubridge/mcubridge/protocol/protocol.py --cpp mcubridge-library-arduino/src/protocol/rpc_protocol.h --cpp-structs mcubridge-library-arduino/src/protocol/rpc_structs.h --py-client mcubridge-client-examples/mcubridge_client/protocol.py --structures mcubridge/mcubridge/protocol/structures.py

[testenv:lint]
commands_pre =
    {[testenv:protocol]commands}
commands =
    ruff check mcubridge mcubridge-client-examples tools mcubridge/scripts

[testenv:typecheck]
commands_pre =
    {[testenv:protocol]commands}
commands =
    pyright

[testenv:py313]
commands_pre =
    {[testenv:protocol]commands}
commands =
    python -m pytest -n 5 mcubridge/tests mcubridge-client-examples/client_tests

[testenv:cppcheck]
commands =
    cppcheck --enable=all --suppress=missingIncludeSystem \
             --std=c++17 -DPROGMEM="" -I mcubridge-library-arduino/src \
             mcubridge-library-arduino/src

[testenv:arduino]
commands_pre =
    {[testenv:protocol]commands}
commands =
    ./tools/ci_arduino_host_tests.sh

[testenv:e2e]
commands_pre =
    {[testenv:protocol]commands}
commands =
    ./tools/compile_emulator.sh
    sh -c 'mosquitto -d -p 1883 -P /tmp/mosquitto_e2e.pid >/dev/null 2>&1 || true'
    sleep 2
    python3 tools/emulation_runner.py --firmware mcubridge-library-arduino/tests/bridge_emulator \
        mcubridge-client-examples/process_test.py \
        mcubridge-client-examples/mailbox_read_test.py \
        mcubridge-client-examples/sensor_reader_test.py \
        mcubridge-client-examples/all_features_test.py \
        mcubridge-client-examples/console_test.py \
        mcubridge-client-examples/datastore_test.py \
        mcubridge-client-examples/fileio_test.py \
        mcubridge-client-examples/led13_test.py
    # Cleanup mosquitto using the specific pid file
    - sh -c "cat /tmp/mosquitto_e2e.pid | xargs kill 2>/dev/null || true"
    - rm -f /tmp/mosquitto_e2e.pid

[testenv:deps-sync]
commands =
    python tools/sync_runtime_deps.py --check --check-latest

[testenv:lua]
deps =
allowlist_externals =
    luacheck
commands =
    luacheck luci-app-mcubridge/luasrc

[testenv:coverage]
deps =
    {[testenv]deps}
    pytest-cov
    gcovr
    coverage==7.13.5
allowlist_externals =
    {[testenv]allowlist_externals}
    ./tools/coverage_python.sh
    ./tools/coverage_arduino.sh
    bash
commands_pre =
    {[testenv:protocol]commands}
commands =
    bash -c './tools/coverage_python.sh & ./tools/coverage_arduino.sh & wait'

[testenv:arduino-examples]
passenv =
    {[testenv]passenv}
    ARDUINO_METRICS_DIR
allowlist_externals =
    {[testenv]allowlist_externals}
    ./tools/ci_arduino.sh
commands =
    ./tools/ci_arduino.sh
