syntax = "proto3";

package rpc.pb;

enum PinModeType {
    PIN_INPUT = 0;
    PIN_OUTPUT = 1;
    PIN_INPUT_PULLUP = 2;
}

message VersionResponse {
    uint32 major = 1;
    uint32 minor = 2;
    uint32 patch = 3;
}

message FreeMemoryResponse {
    uint32 value = 1;
}

message Capabilities {
    uint32 ver = 1;
    uint32 arch = 2;
    uint32 dig = 3;
    uint32 ana = 4;
    bool watchdog = 5;
    bool debug_frames = 6;
    bool debug_io = 7;
    bool eeprom = 8;
    bool dac = 9;
    bool hw_serial1 = 10;
    bool fpu = 11;
    bool logic_3v3 = 12;
    bool big_buffer = 13;
    bool i2c = 14;
    bool spi = 15;
    bool sd = 16;
    uint32 feat = 17;
}

message PinMode {
    uint32 pin = 1;
    PinModeType mode = 2;
}

message DigitalWrite {
    uint32 pin = 1;
    uint32 value = 2;
}

message AnalogWrite {
    uint32 pin = 1;
    uint32 value = 2;
}

message PinRead {
    uint32 pin = 1;
}

message DigitalReadResponse {
    uint32 value = 1;
}

message AnalogReadResponse {
    uint32 value = 1;
}

message ConsoleWrite {
    bytes data = 1;
}

message DatastorePut {
    string key = 1;
    bytes value = 2;
}

message DatastoreGet {
    string key = 1;
}

message DatastoreGetResponse {
    bytes value = 1;
}

message MailboxPush {
    bytes data = 1;
}

message MailboxProcessed {
    uint32 message_id = 1;
}

message MailboxAvailableResponse {
    uint32 count = 1;
}

message MailboxReadResponse {
    bytes content = 1;
}

message FileWrite {
    string path = 1;
    bytes data = 2;
}

message FileRead {
    string path = 1;
}

message FileRemove {
    string path = 1;
}

message FileReadResponse {
    bytes content = 1;
}

message ProcessRunAsync {
    string command = 1;
}

message ProcessRunAsyncResponse {
    uint32 pid = 1;
}

message ProcessPoll {
    uint32 pid = 1;
}

message ProcessPollResponse {
    uint32 status = 1;
    uint32 exit_code = 2;
    bytes stdout_data = 3;
    bytes stderr_data = 4;
    bool finished = 5;
    bool stdout_truncated = 6;
    bool stderr_truncated = 7;
}

message ProcessKill {
    uint32 pid = 1;
}

message GenericResponse {
    string status = 1;
    string message = 2;
}

message StructuredEntry {
    string key = 1;
    oneof value {
        string string_value = 2;
        bytes bytes_value = 3;
        bool bool_value = 4;
        int64 int_value = 5;
        float float_value = 6;
        bool null_value = 7;
    }
}

message StructuredPayload {
    repeated StructuredEntry entries = 1;
}

message AckPacket {
    uint32 command_id = 1;
}

message HandshakeConfig {
    uint32 ack_timeout_ms = 1;
    uint32 ack_retry_limit = 2;
    uint32 response_timeout_ms = 3;
}

message SetBaudratePacket {
    uint32 baudrate = 1;
}

message LinkSync {
    bytes nonce = 1;
    bytes tag = 2;
}

message EnterBootloader {
    uint32 magic = 1;
}

message SpiTransfer {
    bytes data = 1;
}

message SpiTransferResponse {
    bytes data = 1;
}

message SpiConfig {
    uint32 bit_order = 1;
    uint32 data_mode = 2;
    uint32 frequency = 3;
}

message SupervisorSnapshot {
    uint32 restarts = 1;
    double last_failure_unix = 2;
    string last_exception = 3;
    double backoff_seconds = 4;
    bool fatal = 5;
}

message SystemStatus {
    double cpu_percent = 1;
    uint64 memory_total_bytes = 2;
    uint64 memory_available_bytes = 3;
    double load_avg_1m = 4;
    double uptime_seconds = 5;
}

message SerialLinkSnapshot {
    bool connected = 1;
    bool writer_attached = 2;
    bool synchronised = 3;
}

message HandshakeSnapshot {
    bool synchronised = 1;
    uint32 attempts = 2;
    uint32 successes = 3;
    uint32 failures = 4;
    uint32 failure_streak = 5;
    string last_error = 6;
    double last_unix = 7;
    double last_duration = 8;
    double backoff_until = 9;
    double rate_limit_until = 10;
    uint32 fatal_count = 11;
    string fatal_reason = 12;
    string fatal_detail = 13;
    double fatal_unix = 14;
    bool pending_nonce = 15;
    uint32 nonce_length = 16;
}

message PipelineEvent {
    string event = 1;
    uint32 command_id = 2;
    uint32 attempt = 3;
    bool ack_received = 4;
    uint32 status = 5;
    double timestamp = 6;
}

message SerialPipelineSnapshot {
    PipelineEvent inflight = 1;
    PipelineEvent last_completion = 2;
}

message SerialFlowSnapshot {
    uint32 commands_sent = 1;
    uint32 commands_acked = 2;
    uint32 retries = 3;
    uint32 failures = 4;
    double last_event_unix = 5;
}

message BridgeSnapshot {
    SerialLinkSnapshot serial_link = 1;
    HandshakeSnapshot handshake = 2;
    SerialPipelineSnapshot serial_pipeline = 3;
    SerialFlowSnapshot serial_flow = 4;
    VersionResponse mcu_version = 5;
    Capabilities capabilities = 6;
}

message RpcEnvelope {
    uint32 version = 1;
    uint32 command_id = 2;
    uint32 sequence_id = 3;
    bytes nonce = 4;
    bytes tag = 5;
    oneof payload_type {
        bytes encrypted_payload = 6;
        VersionResponse version_resp = 7;
        FreeMemoryResponse free_memory_resp = 8;
        Capabilities capabilities = 9;
        PinMode pin_mode = 10;
        DigitalWrite digital_write = 11;
        AnalogWrite analog_write = 12;
        PinRead pin_read = 13;
        DigitalReadResponse digital_read_resp = 14;
        AnalogReadResponse analog_read_resp = 15;
        ConsoleWrite console_write = 16;
        DatastorePut datastore_put = 17;
        DatastoreGet datastore_get = 18;
        DatastoreGetResponse datastore_get_resp = 19;
        MailboxPush mailbox_push = 20;
        MailboxProcessed mailbox_processed = 21;
        MailboxAvailableResponse mailbox_available_resp = 22;
        MailboxReadResponse mailbox_read_resp = 23;
        FileWrite file_write = 24;
        FileRead file_read = 25;
        FileRemove file_remove = 26;
        FileReadResponse file_read_resp = 27;
        ProcessRunAsync process_run_async = 28;
        ProcessRunAsyncResponse process_run_async_resp = 29;
        ProcessPoll process_poll = 30;
        ProcessPollResponse process_poll_resp = 31;
        ProcessKill process_kill = 32;
        GenericResponse generic_resp = 33;
        AckPacket ack_packet = 34;
        HandshakeConfig handshake_config = 35;
        SetBaudratePacket set_baudrate_packet = 36;
        LinkSync link_sync = 37;
        EnterBootloader enter_bootloader = 38;
        SpiTransfer spi_transfer = 39;
        SpiTransferResponse spi_transfer_resp = 40;
        SpiConfig spi_config = 41;
    }
}
