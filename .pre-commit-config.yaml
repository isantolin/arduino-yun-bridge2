repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/RobertCraiworthy/pyright-pre-commit
    rev: v1.1.400
    hooks:
      - id: pyright
        additional_dependencies:
          - -r requirements/runtime.txt
