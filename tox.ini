[tox]
envlist = py313, protocol, lint, typecheck, cppcheck
isolated_build = false
skip_missing_interpreters = true
skipsdist = true

[testenv]
basepython = python3.13
setenv =
    PYTHONPATH = {toxinidir}:{toxinidir}/mcubridge:{toxinidir}/mcubridge-client-examples:{toxinidir}/stubs
passenv =
    LC_ALL
    LANG
deps =
    -r requirements/runtime.txt
    pytest
    pytest-asyncio
    pytest-timeout
commands =
    python -W error -m pytest {posargs:mcubridge/tests mcubridge-client-examples/client_tests}

[testenv:lint]
description = Run static analysis via Ruff.
skip_install = true
deps =
    ruff==0.15.4
commands =
    ruff check {posargs:mcubridge mcubridge-client-examples tools mcubridge/scripts stubs}

[testenv:cppcheck]
description = Run static analysis for C++ code via Cppcheck.
skip_install = true
deps =
allowlist_externals = cppcheck
commands =
    cppcheck --enable=warning,performance,portability,style \
             --error-exitcode=1 \
             --suppress=missingIncludeSystem \
             --suppressions-list=tools/cppcheck_suppressions.txt \
             -I tools/arduino_stub/include \
             -I mcubridge-library-arduino/src \
             mcubridge-library-arduino/src/

[testenv:coverage]
basepython = python3.13
deps =
    {[testenv]deps}
    pytest-cov
    pytest-timeout
    gcovr
allowlist_externals =
    ./tools/coverage_python.sh
    ./tools/coverage_arduino.sh
commands =
    ./tools/coverage_python.sh
    ./tools/coverage_arduino.sh

[testenv:lua]
description = Run static analysis for Lua code.
setenv =
    PYTHONWARNINGS = default::DeprecationWarning:tarfile
deps =
    hererocks
    hererocks
allowlist_externals =
    .tox/lua_env/bin/luarocks
    .tox/lua_env/bin/luacheck
commands =
    hererocks .tox/lua_env -l5.1 -rlatest
    .tox/lua_env/bin/luarocks install luafilesystem
    .tox/lua_env/bin/luarocks install argparse
    .tox/lua_env/bin/luarocks install luacheck
    .tox/lua_env/bin/luacheck luci-app-mcubridge/luasrc

[testenv:deps-sync]
description = Ensure runtime deps are synchronized (toml -> txt + Makefile).
skip_install = true
deps =
    msgspec
    typer[all]
commands =
    python tools/sync_runtime_deps.py --check

[testenv:protocol]
description = Ensure protocol bindings are regenerated.
skip_install = true
allowlist_externals = git
deps =
    msgspec
    typer[all]
    ruff
commands =
    python tools/protocol/generate.py --spec tools/protocol/spec.toml --py mcubridge/mcubridge/protocol/protocol.py --cpp mcubridge-library-arduino/src/protocol/rpc_protocol.h --cpp-structs mcubridge-library-arduino/src/protocol/rpc_structs.h
    ruff format mcubridge/mcubridge/protocol/protocol.py
    git diff --exit-code mcubridge/mcubridge/protocol/protocol.py mcubridge-library-arduino/src/protocol/rpc_protocol.h mcubridge-library-arduino/src/protocol/rpc_structs.h

[testenv:arduino]
description = Build + run host C++ tests for the Arduino library (via stubs).
skip_install = true
deps =
allowlist_externals =
    ./tools/ci_arduino_host_tests.sh
commands =
    ./tools/ci_arduino_host_tests.sh

[testenv:arduino-examples]
description = Compile Arduino examples to verify they build correctly.
skip_install = true
setenv =
    ARDUINO_METRICS_DIR = {env:ARDUINO_METRICS_DIR:}
deps =
allowlist_externals =
    ./tools/ci_arduino.sh
commands =
    ./tools/ci_arduino.sh

[testenv:typecheck]
description = Run static type checking via Pyright.
skip_install = true
deps =
    pyright
    -r requirements/runtime.txt
commands =
    pyright

[testenv:e2e]
description = Run End-to-End tests (emulator + daemon + client examples) with local MQTT broker.
skip_install = true
deps =
    -r requirements/runtime.txt
    paho-mqtt
allowlist_externals =
    ./tools/compile_emulator.sh
    ./tools/emulation_runner.py
    /usr/bin/python3
    mosquitto
    kill
    sleep
    sh
commands =
    ./tools/compile_emulator.sh
    # Start mosquitto in background
    mosquitto -d -p 1883
    sleep 1
    # Run emulation runner
    python3 tools/emulation_runner.py --firmware bridge_emulator \
        mcubridge-client-examples/led13_test.py \
        mcubridge-client-examples/console_test.py \
        mcubridge-client-examples/datastore_test.py \
        mcubridge-client-examples/fileio_test.py \
        mcubridge-client-examples/mailbox_read_test.py \
        mcubridge-client-examples/process_test.py \
        mcubridge-client-examples/sensor_reader_test.py
    # Kill mosquitto
    sh -c "kill $(cat /var/run/mosquitto.pid 2>/dev/null || pgrep mosquitto) || true"
