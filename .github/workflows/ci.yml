name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 1: Fast Checks (Consolidated) - ~1min total
  # ═══════════════════════════════════════════════════════════════════════════
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-tox
        with:
          install-system-deps: 'true'
      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y cppcheck lua-check
      - name: Check for Hardcoded Secrets
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -r "serial_shared_secret.*=.*['\"][^'\"]\{8,\}['\"]" \
               --include="mcubridge" mcubridge/uci-defaults/ 2>/dev/null | \
               grep -v "6368616e67656d65313233" | grep -v '""' | grep -v "''"; then
            echo "::error::Hardcoded secret found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets"
      - name: Run Consolidated Checks
        run: tox -e protocol,deps-sync,lua,cppcheck,typecheck,lint

  arduino-examples:
    name: Arduino Examples Compilation
    runs-on: ubuntu-24.04
    needs: [static-analysis]
    timeout-minutes: 10
    env:
      ARDUINO_METRICS_DIR: arduino-logs
    steps:
      - uses: actions/checkout@v6
      - name: Setup Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
      - name: Install Arduino Dependencies
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install "Embedded Template Library ETL"
      - uses: ./.github/actions/setup-python-tox
      - name: Compile Examples
        run: |
          mkdir -p arduino-build
          tox -e arduino-examples -- arduino-build
      - name: Profile Memory Usage
        if: always()
        run: |
          mkdir -p arduino-logs
          python tools/arduino_symbol_profiler.py arduino-build --output arduino-logs/symbol_profile.md
      - name: Upload Arduino Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arduino-logs
          path: arduino-logs
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 2: Tests (after fast checks pass) - ~10min total
  # ═══════════════════════════════════════════════════════════════════════════
  unified-tests:
    name: Unified Host Tests & Coverage
    runs-on: ubuntu-24.04
    needs: [static-analysis]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-tox
      - name: Install Build Tools
        run: |
          sudo apt-get update && sudo apt-get install -y g++ make
      - name: Setup Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
      - name: Install Arduino Dependencies
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install "Embedded Template Library ETL"
      - name: Run All Tests with Coverage
        run: tox -e coverage
      - name: Upload Python Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-python
          path: coverage/python
          if-no-files-found: ignore
      - name: Upload Arduino Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-arduino-host
          path: coverage/arduino
          if-no-files-found: ignore

  arduino-emulation:
    name: Arduino Emulation (${{ matrix.name }})
    runs-on: ubuntu-24.04
    needs: [static-analysis]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Full Firmware
            firmware: mcubridge-library-arduino/tests/bridge_emulator
            scripts: >-
              mcubridge-client-examples/client_tests/test_smoke_connection.py
              mcubridge-client-examples/led13_test.py
              mcubridge-client-examples/console_test.py
              mcubridge-client-examples/datastore_test.py
              mcubridge-client-examples/fileio_test.py
              mcubridge-client-examples/process_test.py
              mcubridge-client-examples/mailbox_read_test.py
              mcubridge-client-examples/sensor_reader_test.py
              mcubridge-client-examples/all_features_test.py
          - name: Control Sketch
            firmware: mcubridge-library-arduino/tests/bridge_control_emulator
            scripts: >-
              mcubridge-client-examples/client_tests/test_smoke_connection.py
              mcubridge-client-examples/led13_test.py
              mcubridge-client-examples/console_test.py
              mcubridge-client-examples/mailbox_read_test.py
    timeout-minutes: 20
    services:
      mosquitto:
        image: eclipse-mosquitto:2
        ports:
          - 1883:1883
        options: >-
          --name mosquitto
          --health-cmd "mosquitto_sub -t '$SYS/#' -C 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-tox
      - name: Install Python Dependencies
        run: pip install -r requirements/runtime.txt
      - name: Install Emulation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ socat
      - name: Install Arduino Dependencies
        run: |
          export DUMMY_ARDUINO_LIBS=$(mktemp -d)
          echo "DUMMY_ARDUINO_LIBS=$DUMMY_ARDUINO_LIBS" >> $GITHUB_ENV
          ./mcubridge-library-arduino/tools/install.sh "$DUMMY_ARDUINO_LIBS"
      - name: Compile & Run Emulation
        run: |
          ./tools/compile_emulator.sh
          python3 -u tools/emulation_runner.py \
            --firmware ${{ matrix.firmware }} \
            ${{ matrix.scripts }}

  protocol-fuzzing:
    name: Protocol Stress Test (Fuzzing)
    runs-on: ubuntu-24.04
    needs: [static-analysis]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-tox
      - name: Install Emulation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ socat
      - name: Run Fuzzing Campaign
        run: tox -e fuzz

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 3: Consolidation - ~2min
  # ═══════════════════════════════════════════════════════════════════════════
  coverage-report:
    name: Final Summary
    runs-on: ubuntu-24.04
    needs: [unified-tests, arduino-examples, arduino-emulation, protocol-fuzzing]
    if: always()
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-tox

      - name: Download Python Coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-python
          path: coverage/python
        continue-on-error: true

      - name: Download Arduino Coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-arduino-host
          path: coverage/arduino
        continue-on-error: true

      - name: Download Arduino Logs
        uses: actions/download-artifact@v8
        with:
          name: arduino-logs
          path: arduino-logs
        continue-on-error: true

      - name: Verify Artifacts
        run: |
          echo "### Artifact Verification"
          ls -R
          if [ -d "arduino-logs" ]; then
            echo "Contents of arduino-logs:"
            ls -la arduino-logs/
          fi

      - name: Generate Coverage Summary
        run: |
          pip install -r requirements/runtime.txt rich grpcio-tools nanopb protobuf
          python tools/coverage_report.py \
            --output-markdown coverage/coverage-summary.md \
            --output-json coverage/coverage-summary.json \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

      - name: Generate Memory Summary
        run: |
          # 1. Total usage report
          python tools/arduino_memory_report.py arduino-logs \
            --github-step-summary "$GITHUB_STEP_SUMMARY"
          
          # 2. Advanced Symbol Profiling (cat pre-generated report)
          if [ -f arduino-logs/symbol_profile.md ]; then
            cat arduino-logs/symbol_profile.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Generate Daemon Profile
        env:
          PYTHONPATH: mcubridge:mcubridge-client-examples:typings
        run: |
          # 1. Mandatory Protocol Generation (Required for imports)
          python tools/protocol/generate.py \
            --spec tools/protocol/spec.toml \
            --py mcubridge/mcubridge/protocol/protocol.py \
            --py-client mcubridge-client-examples/mcubridge_client/protocol.py \
            --structures mcubridge/mcubridge/protocol/structures.py
          
          # 2. Standard performance profile
          python tools/daemon_profile_report.py \
            --iterations 2000 \
            --json coverage/daemon-profile.json \
            --github-step-summary "$GITHUB_STEP_SUMMARY"
          
          # 3. Advanced Runtime Profiling (Architecture, Memory, Time & Size)
          python tools/python_runtime_profiler.py \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

      - name: Upload Combined Coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-combined
          path: coverage/
          if-no-files-found: ignore
